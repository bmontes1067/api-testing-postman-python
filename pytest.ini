[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --cov=.
    --cov-report=html:reports/coverage
    --cov-report=term-missing
markers =
    smoke: fast smoke tests to verify basic API health
    regression: full regression suite
    negative: negative/error case tests
