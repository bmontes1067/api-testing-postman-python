name: 🧪 API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 7 * * *'

jobs:
  pytest:
    name: pytest — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🧪 Run pytest
        run: pytest
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://jsonplaceholder.typicode.com' }}
          RESPONSE_TIME_THRESHOLD_MS: 2000

      - name: 📊 Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: reports/
          retention-days: 14

  newman:
    name: Newman — Postman collection
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: 🧪 Run Postman collection
        run: |
          newman run postman/jsonplaceholder_collection.json \
            --env-var "base_url=https://jsonplaceholder.typicode.com" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/newman-report.html

      - name: 📊 Upload Newman report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: reports/newman-report.html
          retention-days: 14
